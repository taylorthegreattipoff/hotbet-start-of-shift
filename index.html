<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOT Bet Start of Shift Checklist</title>
  <style>
    :root {
      --bg: #06162c;
      --panel: #0d2442;
      --panel-2: #102d52;
      --text: #ffffff;
      --muted: #b8c7d9;
      --accent: #ff7a00;
      --success: #2bb673;
      --danger: #e35d5d;
      --border: rgba(255,255,255,0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg), #03101f);
    }

    .wrapper {
      width: min(900px, 100%);
      margin: 0 auto;
    }

    .header { margin-bottom: 18px; }

    h1 {
      margin: 0 0 6px;
      font-size: 30px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.24);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-weight: 700;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 13px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 16px;
    }

    .readonly {
      min-height: 45px;
      padding: 12px 13px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-2);
      color: var(--muted);
    }

    .category { margin-bottom: 22px; }
    .category:last-child { margin-bottom: 0; }

    .category-title {
      margin: 0 0 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--accent);
      font-size: 20px;
    }

    .checklist {
      display: grid;
      gap: 10px;
    }

    .item {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-2);
    }

    .item.completed {
      border-color: rgba(43,182,115,0.65);
      background: rgba(43,182,115,0.10);
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: var(--success);
      cursor: pointer;
    }

    .task-name {
      margin: 0;
      font-weight: 700;
      line-height: 1.35;
    }

    .task-time {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .progress {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      padding: 12px 16px;
      border: 0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #111;
    }

    .secondary {
      background: #ffffff;
      color: #10213a;
    }

    .danger {
      border: 1px solid rgba(227,93,93,0.5);
      background: transparent;
      color: #ffc1c1;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    textarea {
      width: 100%;
      min-height: 390px;
      padding: 14px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #06162c;
      color: #ffffff;
      font-family: Consolas, monospace;
      font-size: 14px;
      line-height: 1.5;
    }

    .status {
      min-height: 22px;
      margin-top: 10px;
      color: var(--success);
      font-weight: 700;
    }

    @media (max-width: 650px) {
      body { padding: 14px; }
      .form-grid { grid-template-columns: 1fr; }
      .item { grid-template-columns: 28px 1fr; }
      .task-time { grid-column: 2; }
    }
  </style>
</head>
<body>
  <main class="wrapper">
    <header class="header">
      <h1>HOT Bet Start of Shift Checklist</h1>
      <p class="subtitle">Complete every item, then copy the finished checklist into Slack.</p>
    </header>

    <section class="card">
      <div class="form-grid">
        <div>
          <label for="agentName">Agent name</label>
          <input id="agentName" type="text" placeholder="Enter your full name" autocomplete="name" />
        </div>
        <div>
          <label>Date and time started</label>
          <div class="readonly" id="startedAt"></div>
        </div>
      </div>
    </section>

    <section class="card">
      <div id="categoryContainer"></div>
      <div class="progress" id="progressText"></div>
    </section>

    <section class="card">
      <div class="actions">
        <button class="primary" id="generateBtn" disabled>Generate Slack Report</button>
        <button class="secondary" id="copyBtn" disabled>Copy for Slack</button>
        <button class="danger" id="resetBtn">Reset Checklist</button>
      </div>
      <div class="status" id="status"></div>
    </section>

    <section class="card">
      <label for="slackOutput">Slack report</label>
      <textarea id="slackOutput" readonly placeholder="The completed report will appear here."></textarea>
    </section>
  </main>

  <script>
    const tasks = [
      { category: "Setup", task: "Create races today" },
      { category: "Setup", task: "Create races tomorrow" },
      { category: "Setup", task: "Create races DAT" },
      { category: "Setup", task: "Create races DADAT" },
      { category: "Setup", task: "Load Form and Silks for today and upcoming days" },

      { category: "Site Check", task: "Check Quaddie button is showing for all Australian races (if not, raise immediately)" },
      { category: "Site Check", task: "Check race fields for data/odds coming through" },
      { category: "Site Check", task: "Check race fields to ensure that form is showing for all races" },
      { category: "Site Check", task: "Check 'Silks' alert for major popular sports only, i.e. NRL, AFL, NBA etc." },
      { category: "Site Check", task: "Check Popular Sports for events showing markets and prices" },
      { category: "Site Check", task: "Check Trending Sport/Racing is populated (close to weekend)" }
    ];

    const state = {
      startedAt: new Date(),
      completedTimes: {}
    };

    const categoryContainer = document.getElementById("categoryContainer");
    const agentNameEl = document.getElementById("agentName");
    const startedAtEl = document.getElementById("startedAt");
    const progressTextEl = document.getElementById("progressText");
    const generateBtn = document.getElementById("generateBtn");
    const copyBtn = document.getElementById("copyBtn");
    const resetBtn = document.getElementById("resetBtn");
    const slackOutput = document.getElementById("slackOutput");
    const statusEl = document.getElementById("status");

    function formatDate(date) {
      return new Intl.DateTimeFormat("en-AU", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric"
      }).format(date);
    }

    function formatTime(date) {
      return new Intl.DateTimeFormat("en-AU", {
        hour: "numeric",
        minute: "2-digit"
      }).format(date);
    }

    function formatDateTime(date) {
      return `${formatDate(date)} ${formatTime(date)}`;
    }

    function renderChecklist() {
      categoryContainer.innerHTML = "";
      const categories = [...new Set(tasks.map(item => item.category))];

      categories.forEach(categoryName => {
        const categorySection = document.createElement("section");
        categorySection.className = "category";

        const heading = document.createElement("h2");
        heading.className = "category-title";
        heading.textContent = categoryName;

        const checklist = document.createElement("div");
        checklist.className = "checklist";

        tasks.forEach((itemData, index) => {
          if (itemData.category !== categoryName) return;

          const item = document.createElement("div");
          item.className = "item";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.id = `task-${index}`;

          const label = document.createElement("label");
          label.htmlFor = checkbox.id;
          label.className = "task-name";
          label.textContent = itemData.task;

          const time = document.createElement("div");
          time.className = "task-time";
          time.textContent = "Not completed";

          checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
              const completedAt = new Date();
              state.completedTimes[index] = completedAt;
              time.textContent = formatTime(completedAt);
              item.classList.add("completed");
            } else {
              delete state.completedTimes[index];
              time.textContent = "Not completed";
              item.classList.remove("completed");
            }

            slackOutput.value = "";
            copyBtn.disabled = true;
            statusEl.textContent = "";
            updateProgress();
          });

          item.appendChild(checkbox);
          item.appendChild(label);
          item.appendChild(time);
          checklist.appendChild(item);
        });

        categorySection.appendChild(heading);
        categorySection.appendChild(checklist);
        categoryContainer.appendChild(categorySection);
      });

      updateProgress();
    }

    function updateProgress() {
      const completed = Object.keys(state.completedTimes).length;
      const allComplete = completed === tasks.length;
      const hasName = agentNameEl.value.trim().length > 0;

      progressTextEl.textContent = `${completed} of ${tasks.length} items completed`;
      generateBtn.disabled = !(allComplete && hasName);
    }

    function generateReport() {
      const agentName = agentNameEl.value.trim();

      if (!agentName) {
        statusEl.textContent = "Enter the agent's name first.";
        return;
      }

      if (Object.keys(state.completedTimes).length !== tasks.length) {
        statusEl.textContent = "Complete every checklist item first.";
        return;
      }

      const finishedAt = new Date();
      const categories = [...new Set(tasks.map(item => item.category))];

      const lines = [
        "═══════════════════════════════",
        "✅ HOT Bet Start of Shift Complete",
        "═══════════════════════════════",
        "",
        `👤 Agent: ${agentName}`,
        `📅 Date: ${formatDate(finishedAt)}`,
        `🕗 Started: ${formatTime(state.startedAt)}`,
        `🏁 Completed: ${formatTime(finishedAt)}`,
        ""
      ];

      categories.forEach(categoryName => {
        lines.push("━━━━━━━━━━━━━━");
        lines.push(categoryName.toUpperCase());
        lines.push("━━━━━━━━━━━━━━");

        tasks.forEach((itemData) => {
          if (itemData.category === categoryName) {
            lines.push(`✔ ${itemData.task}`);
          }
        });

        lines.push("");
      });

      lines.push("━━━━━━━━━━━━━━");
      lines.push("Status: ✅ COMPLETE");
      lines.push("═══════════════════════════════");

      slackOutput.value = lines.join("\n");
      copyBtn.disabled = false;
      statusEl.textContent = "Slack report generated.";
    }

    async function copyReport() {
      if (!slackOutput.value) return;

      try {
        await navigator.clipboard.writeText(slackOutput.value);
        statusEl.textContent = "Copied. Paste the report into Slack.";
      } catch (error) {
        slackOutput.select();
        document.execCommand("copy");
        statusEl.textContent = "Copied. Paste the report into Slack.";
      }
    }

    function resetChecklist() {
      const confirmed = window.confirm("Reset the checklist for the next shift?");
      if (!confirmed) return;

      state.startedAt = new Date();
      state.completedTimes = {};
      agentNameEl.value = "";
      slackOutput.value = "";
      copyBtn.disabled = true;
      statusEl.textContent = "";
      startedAtEl.textContent = formatDateTime(state.startedAt);
      renderChecklist();
      agentNameEl.focus();
    }

    agentNameEl.addEventListener("input", updateProgress);
    generateBtn.addEventListener("click", generateReport);
    copyBtn.addEventListener("click", copyReport);
    resetBtn.addEventListener("click", resetChecklist);

    startedAtEl.textContent = formatDateTime(state.startedAt);
    renderChecklist();
  </script>
</body>
</html>
